<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hunteredits — Video Portfolio</title>
    <meta
      name="description"
      content="A clean, minimal video portfolio featuring wedding films, vlogs, and YouTube edits."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <p class="eyebrow">HUNTEREDITS</p>
      <h1>Video Portfolio</h1>
      <p class="intro">
        Clean storytelling through motion — wedding films, vlogs, and YouTube edits.
      </p>
    </header>

    <main class="content">
      <section id="wedding-films" class="section section--peach">
        <div class="section-header">
          <h2>Wedding Films</h2>
        </div>
        <div class="video-grid">
          <article class="video-card">
            <iframe
              src="https://www.youtube.com/embed/ysz5S6PUM-U"
              title="Wedding Film 1"
              loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
            ></iframe>
          </article>
          <article class="video-card">
            <iframe
              src="https://www.youtube.com/embed/jfKfPfyJRdk"
              title="Wedding Film 2"
              loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
            ></iframe>
          </article>
        </div>
      </section>

      <section id="vlogs" class="section section--mint">
        <div class="section-header">
          <h2>Vlogs</h2>
        </div>
        <div class="video-grid">
          <article class="video-card">
            <iframe
              src="https://www.youtube.com/embed/aqz-KE-bpKQ"
              title="Vlog 1"
              loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
            ></iframe>
          </article>
          <article class="video-card">
            <iframe
              src="https://www.youtube.com/embed/LXb3EKWsInQ"
              title="Vlog 2"
              loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
            ></iframe>
          </article>
        </div>
      </section>

      <section id="youtube" class="section section--lavender">
        <div class="section-header">
          <h2>YouTube</h2>
        </div>
        <div class="video-grid">
          <article class="video-card">
            <iframe
              src="https://www.youtube.com/embed/dQw4w9WgXcQ"
              title="YouTube Edit 1"
              loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
            ></iframe>
          </article>
          <article class="video-card">
            <iframe
              src="https://www.youtube.com/embed/M7lc1UVf-VE"
              title="YouTube Edit 2"
              loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
            ></iframe>
          </article>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>© <span id="year">2026</span> Hunteredits</p>
    </footer>
  </body>
</html>
